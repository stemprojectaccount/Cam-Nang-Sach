<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Đọc Sách</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0FDF4;
    --ink: #1E293B;
    --primary: #10B981;
    --secondary: #F59E0B;
    --accent: #8B5CF6;
    --muted: #64748B;
    --surface: #FFFFFF;
    --font-serif: 'Nunito', sans-serif;
    --font-sans: 'Nunito', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-sans);
    background-color: var(--bg);
    background-image: radial-gradient(circle at top right, #D1FAE5 0%, transparent 40%), radial-gradient(circle at bottom left, #E0E7FF 0%, transparent 40%);
    background-attachment: fixed;
    color: var(--ink);
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    padding-bottom: 90px;
  }



  h1, h2, h3, h4, .serif { font-family: var(--font-serif); }
  .mono { font-family: var(--font-mono); }
  
  .screen {
    display: none;
    animation: fadeIn 0.4s ease-out forwards;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .screen.active { display: block; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hero Section */
  .hero {
    text-align: center;
    padding: 40px 0 20px;
    position: relative;
  }
  .hero h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.2;
    color: var(--primary);
  }
  .hero p {
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
  }
  
  /* Decorative Bookshelf */
  .bookshelf {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 60px;
    margin-bottom: 20px;
    gap: 4px;
  }
  .book-spine {
    width: 20px;
    border-radius: 2px 2px 0 0;
    box-shadow: inset -2px 0 5px rgba(0,0,0,0.1);
  }

  .book-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media(min-width: 600px) { .book-grid { grid-template-columns: 1fr 1fr; } }
  
  .book-card {
    background: var(--surface);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.1);
    border: 2px solid transparent;
    display: flex;
    flex-direction: row;
    gap: 15px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .book-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
  }
  .book-cover {
    width: 85px;
    height: 125px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  .book-info {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .book-card h4 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; line-height: 1.3; color: var(--ink); }
  .book-card .author { color: var(--muted); font-size: 0.95rem; margin-bottom: 12px; font-weight: 600; }
  .book-card .cat-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    background: #D1FAE5;
    color: var(--primary);
  }
  
  .review-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    font-family: var(--font-sans);
  }
  .review-btn:hover { background: #059669; }

  /* Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 9999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index: 1000;
  }
  .nav-btn {
    background: transparent;
    border: none;
    padding: 10px 20px;
    border-radius: 9999px;
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 1rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn.active {
    background: var(--primary);
    color: white;
  }
  
  /* Filter Pills */
  .filter-container {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 5px 0 20px;
    scrollbar-width: none;
  }
  .filter-container::-webkit-scrollbar { display: none; }
  .filter-pill {
    padding: 8px 16px;
    border-radius: 9999px;
    background: white;
    border: 2px solid #E2E8F0;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .filter-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
</style>
</head>
<body>

<!-- SCREEN: HOME -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <div class="bookshelf" id="hero-bookshelf"></div>
    <h1>Kho Tàng Truyện Cổ</h1>
    <p>Đọc truyện trực tiếp trên ứng dụng</p>
  </div>
  
  <div class="book-grid" id="library-grid" style="padding-top: 20px;"></div>
</div>

<!-- SCREEN: SUGGESTIONS -->
<div id="screen-suggestions" class="screen">
  <div class="hero">
    <h1>Gợi Ý Sách Hay</h1>
    <p>Khám phá 100 cuốn sách theo độ tuổi</p>
  </div>
  
  <div class="filter-container">
    <button class="filter-pill active" onclick="filterAge('All', this)">Tất cả</button>
    <button class="filter-pill" onclick="filterAge('5-7', this)">5-7 tuổi</button>
    <button class="filter-pill" onclick="filterAge('8-10', this)">8-10 tuổi</button>
    <button class="filter-pill" onclick="filterAge('11-13', this)">11-13 tuổi</button>
    <button class="filter-pill" onclick="filterAge('14-15', this)">14-15 tuổi</button>
  </div>
  
  <div class="book-grid" id="suggestions-grid" style="padding-top: 20px;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="navTo('home', this)">
    <span style="font-size: 1.3rem; margin-right: 4px; display: inline-block; transform: translateY(2px);">📚</span> Kho Sách
  </button>
  <button class="nav-btn" onclick="navTo('suggestions', this)">
    <span style="font-size: 1.3rem; margin-right: 4px; display: inline-block; transform: translateY(2px);">💡</span> Gợi Ý Sách
  </button>
</nav>

<!-- SCREEN: READER -->
<div id="screen-reader" class="screen" style="max-width: 800px; margin: 0 auto; padding-bottom: 100px;">
  <button onclick="closeReader()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; margin-bottom:20px; color:var(--muted);">← Quay lại</button>
  <h2 id="reader-title" class="serif" style="font-size: 2rem; margin-bottom: 5px;">Title</h2>
  <p id="reader-author" style="color: var(--muted); margin-bottom: 30px; font-style: italic;">Author</p>
  <div id="reader-content" style="font-size: 1.1rem; line-height: 1.8;"></div>
</div>

<script type="module">
import { db } from './src/firebase.ts';
import { collection, getDocs } from 'firebase/firestore';

let BOOKS = [];

const COLORS = {
  "5-7": "var(--amber)",
  "8-10": "var(--emerald)",
  "11-13": "var(--violet)",
  "14-15": "var(--crimson)"
};

const TITLES = {
  "5-7": "👶 Làm Quen & Yêu Sách",
  "8-10": "🧒 Tư Duy & Thói Quen",
  "11-13": "👦 Mở Rộng Nhận Thức",
  "14-15": "🧑 Định Hình Bản Thân"
};

// State
let readingStatus = JSON.parse(localStorage.getItem('readingStatus')) || {};
let reviews = JSON.parse(localStorage.getItem('reviews')) || {};
let currentGroup = null;
let currentFilter = 'All';
let currentReviewBookId = null;

const coverCache = JSON.parse(localStorage.getItem('bookCovers') || '{}');

async function getBookCover(title, author, id) {
  if (coverCache[id]) return coverCache[id];
  
  try {
    const query = encodeURIComponent(`intitle:${title}`);
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}&key=AIzaSyC6b0R_6lwrKQaX7paIFIbkujJRbJRUSog`);
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      for (let item of data.items) {
        if (item.volumeInfo && item.volumeInfo.imageLinks && item.volumeInfo.imageLinks.thumbnail) {
          const url = item.volumeInfo.imageLinks.thumbnail.replace('http:', 'https:');
          coverCache[id] = url;
          localStorage.setItem('bookCovers', JSON.stringify(coverCache));
          return url;
        }
      }
    }
  } catch (e) {
    console.error('Error fetching cover:', e);
  }
  
  const fallback = `https://picsum.photos/seed/${id}/400/600`;
  coverCache[id] = fallback;
  localStorage.setItem('bookCovers', JSON.stringify(coverCache));
  return fallback;
}

// Init
async function init() {
  drawDecorativeBookshelf();
  
  try {
    const readableSnapshot = await getDocs(collection(db, 'readable_books'));
    READABLE_BOOKS = readableSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    const suggestedSnapshot = await getDocs(collection(db, 'suggested_books'));
    BOOKS = suggestedSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  } catch (error) {
    console.error("Error fetching books from Firestore:", error);
  }

  renderLibrary();
  renderSuggestions();
}

function drawDecorativeBookshelf() {
  const shelf = document.getElementById('hero-bookshelf');
  const colors = ['#D97706', '#059669', '#7C3AED', '#DC2626', '#1B2A1A'];
  for(let i=0; i<15; i++) {
    const book = document.createElement('div');
    book.className = 'book-spine';
    book.style.height = (30 + Math.random() * 30) + 'px';
    book.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    book.style.opacity = 0.8;
    shelf.appendChild(book);
  }
}

// Navigation
window.navTo = function(screenId, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
  
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
  window.scrollTo(0, 0);
}

window.filterAge = function(age, el) {
  currentFilter = age;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  if(el) el.classList.add('active');
  renderSuggestions();
}

function renderSuggestions() {
  const grid = document.getElementById('suggestions-grid');
  grid.innerHTML = '';
  
  let booksToRender = BOOKS;
  if(currentFilter !== 'All') {
    booksToRender = BOOKS.filter(b => b.age === currentFilter);
  }
  
  booksToRender.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" id="cover-s-${book.id}" alt="Cover" class="book-cover" referrerPolicy="no-referrer">
      <div class="book-info">
        <span class="cat-badge">${book.cat}</span>
        <h4 class="serif">${book.title}</h4>
        <div class="author">${book.author}</div>
        <div style="font-size:0.85rem; color:var(--muted); margin-bottom:15px;">${book.desc}</div>
      </div>
    `;
    grid.appendChild(card);
    
    getBookCover(book.title, book.author, 's-'+book.id).then(url => {
      const img = document.getElementById(`cover-s-${book.id}`);
      if(img) img.src = url;
    });
  });
}

let READABLE_BOOKS = [];

function renderLibrary() {
  const grid = document.getElementById('library-grid');
  grid.innerHTML = '';
  
  READABLE_BOOKS.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.style.cursor = 'pointer';
    card.onclick = () => window.openReader(book.id);
    card.innerHTML = `
      <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" id="cover-${book.id}" alt="Cover" class="book-cover" referrerPolicy="no-referrer">
      <div class="book-info">
        <h4 class="serif">${book.title}</h4>
        <div class="author">${book.author}</div>
        <div style="margin-top: auto;">
          <button class="review-btn" style="opacity:1; pointer-events:auto; width:100%;">Đọc ngay</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
    
    getBookCover(book.title, book.author, book.id).then(url => {
      const img = document.getElementById(`cover-${book.id}`);
      if(img) img.src = url;
    });
  });
}

window.openReader = function(id) {
  const book = READABLE_BOOKS.find(b => b.id === id);
  document.getElementById('reader-title').innerText = book.title;
  document.getElementById('reader-author').innerText = book.author;
  document.getElementById('reader-content').innerHTML = book.content;
  
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-reader').classList.add('active');
  window.scrollTo(0, 0);
}

window.closeReader = function() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

init();
</script>
</body>
</html>
